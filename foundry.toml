[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

[rpc_endpoints]
hashkey_testnet = "https://testnet.hsk.xyz"
hashkey_mainnet = "https://mainnet.hsk.xyz"

[etherscan]
hashkey_testnet = { key = "${ETHERSCAN_API_KEY}", url = "https://testnet-explorer.hsk.xyz/api" }
